name: quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python data/generate_synthetic_data.py
      - run: python python/calculate_kpis.py
      - run: python validation/validate_outputs.py
      - run: pytest -q
